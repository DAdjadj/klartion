<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klartion — Setup</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="wrap">
    <a class="logo" href="/">
      <div class="logo-mark">K</div>
      <span class="logo-name">Klartion</span>
    </a>
    <div class="steps">
      <div class="step active"></div>
      <div class="step"></div>
      <div class="step"></div>
      <div class="step"></div>
      <div class="step"></div>
    </div>
    <div class="card">
      <div class="card-title">Welcome to Klartion</div>
      <div class="card-sub">Step 1 of 5 — enter your license key to get started</div>
      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <label for="license_key" style="margin-top:0;">License key</label>
        <input
          type="text"
          id="license_key"
          name="license_key"
          value="{{ licence_key }}"
          placeholder="XXXX-XXXX-XXXX-XXXX"
          autocomplete="off"
          autofocus
          required
        >
        <div style="font-size:11px; color:var(--hint); margin-top:0.4rem;">
          Don't have one? <a href="https://klartion.com" style="color:var(--muted);">Purchase at klartion.com →</a>
        </div>
        <button class="btn btn-primary" type="submit">Continue →</button>
      </form>
    </div>
    <nav class="footer-nav">
      <a href="/setup" class="active">License</a>
      <a href="/setup/notion">Notion</a>
      <a href="/setup/notifications">Notifications</a>
      <a href="/connect">Bank</a>
      <a href="/status">Status</a>
    </nav>
  </div>
    <footer class="app-footer">
      <a href="mailto:support@david-alves.com">Support</a>
      <a href="https://klartion.com/privacy" target="_blank">Privacy</a>
      <a href="https://klartion.com/terms" target="_blank">Terms</a>
      <a href="https://github.com/DAdjadj/klartion" target="_blank">GitHub</a>
    </footer>
</body>
</html>
