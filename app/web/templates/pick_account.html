{% extends "base.html" %}
{% block title %}Klartion — Choose account{% endblock %}
{% block steps %}
<div class="steps">
  <div class="step done"></div>
  <div class="step done"></div>
  <div class="step done"></div>
  <div class="step done"></div>
  <div class="step active"></div>
  <div class="step"></div>
</div>
{% endblock %}
{% block content %}
<div class="card">
  <div class="card-title">Choose an account</div>
  <div class="card-sub">Your bank returned multiple accounts. Select the one you want to sync.</div>

  <form method="POST" action="/pick-account">
    <div style="display:flex; flex-direction:column; gap:0.5rem; margin:1rem 0;">
      {% for account in accounts %}
      <label style="display:flex; align-items:center; gap:10px; padding:12px 14px; border:1px solid var(--border); border-radius:8px; cursor:pointer; transition:border-color 0.15s;" onmouseover="this.style.borderColor='var(--muted)'" onmouseout="if(!this.querySelector('input').checked) this.style.borderColor='var(--border)'">
        <input type="radio" name="account_uid" value="{{ account.uid or account.account_uid or account.resource_id or '' }}" {% if loop.first %}checked{% endif %} style="accent-color:var(--text); width:16px; height:16px; flex-shrink:0;">
        <div style="min-width:0;">
          {% if account.iban %}
          <div style="font-family:var(--mono); font-size:13px; color:var(--text); letter-spacing:0.5px;">
            {{ account.iban[:4] }} **** **** {{ account.iban[-4:] }}
          </div>
          {% endif %}
          <div style="font-size:11px; color:var(--muted); margin-top:2px;">
            {% if account.name %}{{ account.name }}{% endif %}
            {% if account.currency %}<span style="margin-left:4px; padding:1px 5px; background:var(--surface); border:1px solid var(--border); border-radius:3px; font-size:10px;">{{ account.currency }}</span>{% endif %}
            {% if account.product %}{{ account.product }}{% endif %}
            {% if not account.iban and not account.name and not account.product %}
              Account {{ loop.index }} &mdash; {{ account.uid or account.account_uid or account.resource_id or 'unknown' }}
            {% endif %}
          </div>
        </div>
      </label>
      {% endfor %}
    </div>
    <button class="btn btn-primary" type="submit">Connect this account</button>
  </form>
</div>
{% endblock %}
