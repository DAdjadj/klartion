<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Klartion{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
</head>
<body class="has-shell page-{{ active or 'app' }}">
  <main class="shell-frame">
    <aside class="shell-sidebar">
      <a class="logo" href="/">
        <div class="logo-mark">K</div>
        <span class="logo-name">Klartion</span>
      </a>

      <nav class="shell-nav">
        <a href="/setup" {% if active == 'license' %}class="active"{% endif %}>
          <span class="nav-icon">&#x1F511;</span> License
        </a>
        <a href="/setup/notion" {% if active == 'notion' %}class="active"{% endif %}>
          <span class="nav-icon">&#x1F4D2;</span> Notion
        </a>
        <a href="/setup/notifications" {% if active == 'notifications' %}class="active"{% endif %}>
          <span class="nav-icon">&#x2709;</span> Notifications
        </a>
        <a href="/setup/sync" {% if active == 'sync' %}class="active"{% endif %}>
          <span class="nav-icon">&#x23F1;</span> Sync
        </a>
        <a href="/connect" {% if active in ['bank', 'enable-banking', 'pick-account'] %}class="active"{% endif %}>
          <span class="nav-icon">&#x1F3E6;</span> Bank
        </a>
        <a href="/status" {% if active == 'status' %}class="active"{% endif %}>
          <span class="nav-icon">&#x2713;</span> Status
        </a>
      </nav>

      <div class="shell-footer">
        <a href="mailto:support@david-alves.com">Support</a>
        <a href="https://klartion.com/privacy" target="_blank">Privacy</a>
        <a href="https://klartion.com/terms" target="_blank">Terms</a>
        <a href="https://github.com/DAdjadj/klartion" target="_blank">GitHub</a>
        <span>v{{ app_version }}</span>
      </div>
    </aside>

    <section class="shell-content">
      <nav class="footer-nav shell-mobile-nav">
        <a href="/setup" {% if active == 'license' %}class="active"{% endif %}>License</a>
        <a href="/setup/notion" {% if active == 'notion' %}class="active"{% endif %}>Notion</a>
        <a href="/setup/notifications" {% if active == 'notifications' %}class="active"{% endif %}>Notifications</a>
        <a href="/setup/sync" {% if active == 'sync' %}class="active"{% endif %}>Sync</a>
        <a href="/connect" {% if active in ['bank', 'enable-banking', 'pick-account'] %}class="active"{% endif %}>Bank</a>
        <a href="/status" {% if active == 'status' %}class="active"{% endif %}>Status</a>
      </nav>

      <div class="wrap">
        <div class="dashboard-surface">
          {% block steps %}{% endblock %}
          {% block content %}{% endblock %}
        </div>
      </div>
    </section>
  </main>
<script>
(function(){var tz=Intl.DateTimeFormat().resolvedOptions().timeZone;if(tz)fetch('/api/timezone',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tz:tz})});})();
</script>
</body>
</html>
