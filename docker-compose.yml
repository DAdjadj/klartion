services:
  klartion:
    image: daalves/klartion:latest
    container_name: klartion
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/compose:ro
    env_file:
      - .env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
